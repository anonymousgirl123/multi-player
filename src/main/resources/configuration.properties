# =============================================================================
# Player Messaging – central configuration file
#
# WHY a properties file and not hardcoded constants?
# Hardcoded values scatter configuration across multiple classes.
# Changing the port or message count requires finding every occurrence,
# recompiling, and redeploying. A single properties file makes every
# tuneable value visible in one place — no source edits, no recompile.
#
# HOW it is loaded:
# ConfigLoader reads this file from the classpath (bundled inside the fat-jar
# by maven-assembly-plugin). To override a value at runtime without rebuilding,
# place a configuration.properties file next to the jar on the file system —
# ConfigLoader checks the working directory first, then falls back to the
# classpath copy.
# =============================================================================

# ---- Logging ----------------------------------------------------------------

# Root log level used by Logback (logback.xml reads this via ${log.level}).
# ConfigLoader promotes all properties to System properties at startup so
# Logback can pick them up before the first Logger is created.
# Valid values: TRACE, DEBUG, INFO, WARN, ERROR
# Override at runtime without rebuilding: java -Dlog.level=DEBUG -jar ...
log.level = INFO

# ---- Conversation settings --------------------------------------------------

# Number of messages the initiator sends before ending the conversation.
# The initiator stops after sent >= max.messages AND received >= max.messages.
max.messages = 10

# The first message sent by the initiator to kick off the conversation.
opening.message = Guten Tag!

# Default number of players for the same-process scenario.
# Can be overridden at the command line: java -jar player-same-process.jar <count>
player.count = 2

# Maximum number of messages buffered in each player's inbox before the sender
# is forced to wait (backpressure). An unbounded queue risks OutOfMemoryError
# under sustained load because a slow consumer never pushes back on a fast
# producer. A bounded queue makes the system self-throttle: the producer thread
# blocks on publish() until the consumer drains the queue.
# For the default 2-player 10-message scenario any value >= 1 is sufficient;
# increase for bursty workloads.
inbox.queue.capacity = 16

# ---- Reconnect settings (multi-process initiator) ---------------------------

# How many times the initiator retries connecting to the responder before giving up.
# Set to 0 to disable retries (fail immediately on first connection error).
reconnect.max.attempts = 5

# Milliseconds to wait between connection attempts (doubles after each failure
# up to a practical ceiling). Increase on slow or remote networks.
reconnect.delay.ms = 500

# ---- Multi-process / network settings ---------------------------------------

# TCP port on which the responder listens and the initiator connects.
server.port = 9090

# Hostname or IP the initiator uses to connect to the responder.
server.host = localhost

# Milliseconds the initiator waits before connecting to give the responder's
# server socket time to bind. Increase this on slow machines.
connect.delay.ms = 1000
